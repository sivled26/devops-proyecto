version: '3.8'

services:
  # --- SERVICIO DE VENTAS ---
  back-ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    ports:
      - "8080:8080" # Tu PC (8080) -> Contenedor Ventas (8080)
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # TODO: REEMPLAZA ESTOS VALORES CON TUS CREDENCIALES REALES DE AWS RDS
      - DB_ENDPOINT=tu-rds-endpoint-de-ventas.amazonaws.com
      - DB_PORT=3306
      - DB_NAME=nombre_base_datos_ventas
      - DB_USERNAME=tu_usuario_aws
      - DB_PASSWORD=tu_contraseña_aws
    networks:
      - red-proyecto

  # --- SERVICIO DE DESPACHOS ---
  back-despachos:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    ports:
      - "8081:8081" # Tu PC (8081) -> Contenedor Despachos (8081)
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # TODO: REEMPLAZA ESTOS VALORES CON TUS CREDENCIALES REALES DE AWS RDS
      - DB_ENDPOINT=tu-rds-endpoint-de-despachos.amazonaws.com
      - DB_PORT=3306
      - DB_NAME=nombre_base_datos_despachos
      - DB_USERNAME=tu_usuario_aws
      - DB_PASSWORD=tu_contraseña_aws
    networks:
      - red-proyecto

  # --- SERVICIO DEL FRONTEND ---
  front-despacho:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
    ports:
      - "80:80" # Tu PC (localhost puerto 80) -> Servidor Nginx del Front
    depends_on:
      - back-ventas
      - back-despachos
    networks:
      - red-proyecto

# Red interna para que los contenedores puedan hablar entre ellos si lo necesitan
networks:
  red-proyecto:
    driver: bridge